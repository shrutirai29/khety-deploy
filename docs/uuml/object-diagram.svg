<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="980" viewBox="0 0 1650 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbf2"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#18311f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7f59"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102217; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5e6b62; }
      .box { stroke-width: 2.5; rx: 26; ry: 26; }
      .head { font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .txt { font: 500 16px 'Consolas', 'Courier New', monospace; }
      .line { stroke: rgba(22,34,24,0.16); stroke-width: 2; }
      .rel { stroke: #5f7f59; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #4e6a49; }
    </style>
  </defs>

  <rect width="1650" height="980" fill="url(#bg)"/>
  <text x="90" y="95" class="title">Khety Object Diagram</text>
  <text x="90" y="127" class="subtitle">Example runtime objects showing one farmer-owner transaction and one disease report</text>

  <g filter="url(#shadow)">
    <rect x="90" y="190" width="280" height="190" fill="#102217" stroke="#102217" class="box"/>
    <line x1="90" y1="255" x2="370" y2="255" class="line" stroke="#35513d"/>
    <text x="230" y="230" text-anchor="middle" class="head" fill="#ffffff">farmer1 : User</text>
    <text x="115" y="295" class="txt" fill="#eff7ef">name = Ramesh</text>
    <text x="115" y="325" class="txt" fill="#eff7ef">role = farmer</text>
    <text x="115" y="355" class="txt" fill="#eff7ef">location = Karnal</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="460" width="280" height="190" fill="#102217" stroke="#102217" class="box"/>
    <line x1="90" y1="525" x2="370" y2="525" class="line" stroke="#35513d"/>
    <text x="230" y="500" text-anchor="middle" class="head" fill="#ffffff">owner1 : User</text>
    <text x="115" y="565" class="txt" fill="#eff7ef">name = Amit Traders</text>
    <text x="115" y="595" class="txt" fill="#eff7ef">role = owner</text>
    <text x="115" y="625" class="txt" fill="#eff7ef">location = Delhi</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="180" width="310" height="235" fill="#eef8ea" stroke="#6f9565" class="box"/>
    <line x1="470" y1="245" x2="780" y2="245" class="line"/>
    <text x="625" y="220" text-anchor="middle" class="head" fill="#102217">crop1 : Crop</text>
    <text x="495" y="285" class="txt" fill="#203126">name = Wheat</text>
    <text x="495" y="315" class="txt" fill="#203126">price = 2500</text>
    <text x="495" y="345" class="txt" fill="#203126">quantity = 20</text>
    <text x="495" y="375" class="txt" fill="#203126">unit = quintal</text>
    <text x="495" y="405" class="txt" fill="#203126">availability = Immediate</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="160" width="360" height="275" fill="#fff6e7" stroke="#c89243" class="box"/>
    <line x1="900" y1="225" x2="1260" y2="225" class="line"/>
    <text x="1080" y="200" text-anchor="middle" class="head" fill="#6b4414">request1 : BuyerRequest</text>
    <text x="925" y="265" class="txt" fill="#5c3b14">requestType = negotiate</text>
    <text x="925" y="295" class="txt" fill="#5c3b14">status = accepted</text>
    <text x="925" y="325" class="txt" fill="#5c3b14">message = Interested in bulk purchase</text>
    <text x="925" y="355" class="txt" fill="#5c3b14">farmerConfirmed = false</text>
    <text x="925" y="385" class="txt" fill="#5c3b14">ownerConfirmed = false</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1330" y="130" width="220" height="190" fill="#fffdf7" stroke="#d3aa60" class="box"/>
    <line x1="1330" y1="195" x2="1550" y2="195" class="line"/>
    <text x="1440" y="170" text-anchor="middle" class="head" fill="#6b4414">chat1</text>
    <text x="1355" y="235" class="txt" fill="#5c3b14">sender = owner</text>
    <text x="1355" y="265" class="txt" fill="#5c3b14">"Can we discuss"</text>
    <text x="1355" y="295" class="txt" fill="#5c3b14">"the final price?"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1330" y="360" width="220" height="190" fill="#f4fbf2" stroke="#8bab80" class="box"/>
    <line x1="1330" y1="425" x2="1550" y2="425" class="line"/>
    <text x="1440" y="400" text-anchor="middle" class="head" fill="#234028">chat2</text>
    <text x="1355" y="465" class="txt" fill="#234028">sender = farmer</text>
    <text x="1355" y="495" class="txt" fill="#234028">"Yes, please share"</text>
    <text x="1355" y="525" class="txt" fill="#234028">"your offer."</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="560" width="360" height="255" fill="#eef5ff" stroke="#7d9dcc" class="box"/>
    <line x1="470" y1="625" x2="830" y2="625" class="line"/>
    <text x="650" y="600" text-anchor="middle" class="head" fill="#153554">prediction1 : Prediction</text>
    <text x="495" y="665" class="txt" fill="#173c5b">result = Tomato Late Blight</text>
    <text x="495" y="695" class="txt" fill="#173c5b">confidence = 96%</text>
    <text x="495" y="725" class="txt" fill="#173c5b">report.problem = fungal infection</text>
    <text x="495" y="755" class="txt" fill="#173c5b">report.solution = fungicide + remove</text>
    <text x="495" y="785" class="txt" fill="#173c5b">infected leaves</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="600" width="320" height="215" fill="#ffffff" stroke="#8ba0af" class="box"/>
    <line x1="990" y1="665" x2="1310" y2="665" class="line"/>
    <text x="1150" y="640" text-anchor="middle" class="head" fill="#243241">product1 : Product</text>
    <text x="1015" y="705" class="txt" fill="#2f3b46">name = Urea Fertilizer</text>
    <text x="1015" y="735" class="txt" fill="#2f3b46">category = Fertilizer</text>
    <text x="1015" y="765" class="txt" fill="#2f3b46">price = 620</text>
    <text x="1015" y="795" class="txt" fill="#2f3b46">stock = 200</text>
  </g>

  <path d="M370 280 C420 280, 430 280, 470 280" class="rel"/>
  <text x="400" y="258" class="label">creates</text>

  <path d="M370 555 C620 520, 850 350, 900 305" class="rel"/>
  <text x="610" y="480" class="label">sends</text>

  <path d="M780 300 C840 300, 845 300, 900 300" class="rel"/>
  <text x="825" y="278" class="label">receives</text>

  <path d="M1260 245 C1295 235, 1305 225, 1330 225" class="rel"/>
  <path d="M1260 350 C1295 395, 1305 445, 1330 455" class="rel"/>
  <text x="1280" y="322" class="label">chat thread</text>

  <path d="M370 300 C430 430, 470 590, 470 665" class="rel"/>
  <text x="390" y="560" class="label">stores scan</text>

  <path d="M370 590 C590 660, 900 700, 990 700" class="rel"/>
  <text x="630" y="735" class="label">browses</text>
</svg>
