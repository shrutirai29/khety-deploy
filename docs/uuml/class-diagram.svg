<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7ea"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#18311f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7f59"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102217; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5e6b62; }
      .box { stroke-width: 2.5; rx: 24; ry: 24; }
      .header { font: 700 24px 'Segoe UI', Arial, sans-serif; }
      .body { font: 500 16px 'Consolas', 'Courier New', monospace; }
      .line { stroke: #cbd7cb; stroke-width: 2; }
      .rel { stroke: #5f7f59; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #4e6a49; }
    </style>
  </defs>

  <rect width="1700" height="1100" fill="url(#bg)"/>
  <text x="90" y="100" class="title">Khety Class Diagram</text>
  <text x="90" y="132" class="subtitle">Schema-level view of the implemented data entities and their relationships</text>

  <g filter="url(#shadow)">
    <rect x="90" y="190" width="360" height="365" fill="#fdfefe" stroke="#6f8f69" class="box"/>
    <line x1="90" y1="255" x2="450" y2="255" class="line"/>
    <line x1="90" y1="405" x2="450" y2="405" class="line"/>
    <text x="270" y="232" text-anchor="middle" class="header" fill="#102217">User</text>
    <text x="115" y="292" class="body" fill="#203126">_id : ObjectId</text>
    <text x="115" y="322" class="body" fill="#203126">name : String</text>
    <text x="115" y="352" class="body" fill="#203126">email : String</text>
    <text x="115" y="382" class="body" fill="#203126">phone : String</text>
    <text x="115" y="437" class="body" fill="#203126">role : farmer | owner</text>
    <text x="115" y="467" class="body" fill="#203126">location : String</text>
    <text x="115" y="497" class="body" fill="#203126">preferredLanguage : String</text>
    <text x="115" y="527" class="body" fill="#203126">accountStatus : active | deactivated</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="170" width="380" height="430" fill="#f8fcf7" stroke="#7ea06f" class="box"/>
    <line x1="520" y1="235" x2="900" y2="235" class="line"/>
    <line x1="520" y1="415" x2="900" y2="415" class="line"/>
    <text x="710" y="212" text-anchor="middle" class="header" fill="#102217">Crop</text>
    <text x="545" y="272" class="body" fill="#203126">_id : ObjectId</text>
    <text x="545" y="302" class="body" fill="#203126">name : String</text>
    <text x="545" y="332" class="body" fill="#203126">price : String</text>
    <text x="545" y="362" class="body" fill="#203126">location : String</text>
    <text x="545" y="392" class="body" fill="#203126">quantity : String</text>
    <text x="545" y="447" class="body" fill="#203126">unit : String</text>
    <text x="545" y="477" class="body" fill="#203126">availability : String</text>
    <text x="545" y="507" class="body" fill="#203126">notes : String</text>
    <text x="545" y="537" class="body" fill="#203126">listingStatus : String</text>
    <text x="545" y="567" class="body" fill="#203126">farmerId : String</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="170" width="370" height="430" fill="#fff8eb" stroke="#c89243" class="box"/>
    <line x1="980" y1="235" x2="1350" y2="235" class="line"/>
    <line x1="980" y1="445" x2="1350" y2="445" class="line"/>
    <text x="1165" y="212" text-anchor="middle" class="header" fill="#6b4414">BuyerRequest</text>
    <text x="1005" y="272" class="body" fill="#5c3b14">ownerId : String</text>
    <text x="1005" y="302" class="body" fill="#5c3b14">ownerName : String</text>
    <text x="1005" y="332" class="body" fill="#5c3b14">ownerPhone : String</text>
    <text x="1005" y="362" class="body" fill="#5c3b14">ownerEmail : String</text>
    <text x="1005" y="392" class="body" fill="#5c3b14">requestType : String</text>
    <text x="1005" y="422" class="body" fill="#5c3b14">message : String</text>
    <text x="1005" y="477" class="body" fill="#5c3b14">farmerResponse : String</text>
    <text x="1005" y="507" class="body" fill="#5c3b14">status : pending/accepted/confirmed</text>
    <text x="1005" y="537" class="body" fill="#5c3b14">farmerConfirmed : Boolean</text>
    <text x="1005" y="567" class="body" fill="#5c3b14">ownerConfirmed : Boolean</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1360" y="270" width="250" height="270" fill="#fffdf8" stroke="#d0a052" class="box"/>
    <line x1="1360" y1="335" x2="1610" y2="335" class="line"/>
    <line x1="1360" y1="405" x2="1610" y2="405" class="line"/>
    <text x="1485" y="312" text-anchor="middle" class="header" fill="#6b4414">ChatMessage</text>
    <text x="1385" y="372" class="body" fill="#5c3b14">senderId : String</text>
    <text x="1385" y="432" class="body" fill="#5c3b14">senderName : String</text>
    <text x="1385" y="462" class="body" fill="#5c3b14">senderRole : String</text>
    <text x="1385" y="492" class="body" fill="#5c3b14">text : String</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="665" width="400" height="300" fill="#f2f7ff" stroke="#7ea1cf" class="box"/>
    <line x1="240" y1="730" x2="640" y2="730" class="line"/>
    <line x1="240" y1="850" x2="640" y2="850" class="line"/>
    <text x="440" y="707" text-anchor="middle" class="header" fill="#12304a">Prediction</text>
    <text x="265" y="767" class="body" fill="#173c5b">userId : String</text>
    <text x="265" y="797" class="body" fill="#173c5b">image : String</text>
    <text x="265" y="827" class="body" fill="#173c5b">result : String</text>
    <text x="265" y="882" class="body" fill="#173c5b">confidence : Number</text>
    <text x="265" y="912" class="body" fill="#173c5b">report.problem : String</text>
    <text x="265" y="942" class="body" fill="#173c5b">report.solution : String</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="690" width="420" height="275" fill="#ffffff" stroke="#8ba0af" class="box"/>
    <line x1="780" y1="755" x2="1200" y2="755" class="line"/>
    <line x1="780" y1="875" x2="1200" y2="875" class="line"/>
    <text x="990" y="732" text-anchor="middle" class="header" fill="#243241">Product</text>
    <text x="805" y="792" class="body" fill="#2f3b46">name : String</text>
    <text x="805" y="822" class="body" fill="#2f3b46">price : Number</text>
    <text x="805" y="852" class="body" fill="#2f3b46">category : String</text>
    <text x="805" y="907" class="body" fill="#2f3b46">sku : String</text>
    <text x="805" y="937" class="body" fill="#2f3b46">stock : Number</text>
  </g>

  <path d="M450 370 C505 370, 495 370, 520 370" class="rel"/>
  <text x="470" y="350" class="label">creates / owns</text>

  <path d="M450 450 C610 520, 850 610, 980 475" class="rel"/>
  <text x="690" y="560" class="label">as owner sends</text>

  <path d="M900 385 C945 385, 945 385, 980 385" class="rel"/>
  <text x="925" y="365" class="label">contains many</text>

  <path d="M1350 390 C1380 390, 1390 390, 1360 390" class="rel"/>
  <text x="1362" y="370" class="label">contains</text>

  <path d="M375 555 C360 630, 385 650, 410 665" class="rel"/>
  <text x="270" y="635" class="label">has many</text>

  <path d="M450 500 C620 690, 770 760, 780 790" class="rel"/>
  <text x="585" y="700" class="label">browses</text>
</svg>
