<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbf2"/>
      <stop offset="100%" stop-color="#fdf7ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#18311f" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102217; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5e6b62; }
      .actor { fill: #102217; stroke: #102217; stroke-width: 2; }
      .actorText { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #102217; }
      .system { fill: rgba(255,255,255,0.7); stroke: #78956f; stroke-width: 3; }
      .uc { fill: #ffffff; stroke: #9bbc90; stroke-width: 2.5; }
      .ucText { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #203126; }
      .edge { stroke: #68855f; stroke-width: 2.2; fill: none; }
      .include { stroke: #c89243; stroke-width: 2; stroke-dasharray: 8 8; fill: none; }
      .label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #8a5b21; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="1020" rx="32" fill="#ffffff" opacity="0.65"/>

  <text x="90" y="110" class="title">Khety Use Case Diagram</text>
  <text x="90" y="142" class="subtitle">Only implemented features from the current frontend and backend codebase</text>

  <rect x="360" y="190" width="1120" height="820" rx="34" class="system" filter="url(#shadow)"/>
  <text x="920" y="235" text-anchor="middle" class="title" style="font-size:28px;">Khety System</text>

  <g transform="translate(110,300)">
    <circle cx="60" cy="30" r="26" fill="#102217"/>
    <line x1="60" y1="56" x2="60" y2="128" class="actor"/>
    <line x1="20" y1="86" x2="100" y2="86" class="actor"/>
    <line x1="60" y1="128" x2="25" y2="182" class="actor"/>
    <line x1="60" y1="128" x2="95" y2="182" class="actor"/>
    <text x="60" y="222" text-anchor="middle" class="actorText">Visitor</text>
  </g>

  <g transform="translate(110,555)">
    <circle cx="60" cy="30" r="26" fill="#102217"/>
