    <ellipse cx="845" cy="690" rx="170" ry="34" class="uc"/>
    <text x="845" y="696" text-anchor="middle" class="ucText">Browse Product Marketplace</text>

    <ellipse cx="1135" cy="690" rx="140" ry="34" class="uc"/>
    <text x="1135" y="696" text-anchor="middle" class="ucText">Create Crop Listing</text>

    <ellipse cx="560" cy="820" rx="150" ry="34" class="uc"/>
    <text x="560" y="826" text-anchor="middle" class="ucText">View My Crop Listings</text>

    <ellipse cx="845" cy="820" rx="175" ry="34" class="uc"/>
    <text x="845" y="826" text-anchor="middle" class="ucText">Browse Farmer Crop Listings</text>

    <ellipse cx="1135" cy="820" rx="175" ry="34" class="uc"/>
    <text x="1135" y="826" text-anchor="middle" class="ucText">Send / Update Request</text>

    <ellipse cx="705" cy="930" rx="110" ry="34" class="uc"/>
    <text x="705" y="936" text-anchor="middle" class="ucText">Chat</text>

    <ellipse cx="920" cy="930" rx="135" ry="34" class="uc"/>
    <text x="920" y="936" text-anchor="middle" class="ucText">Accept / Reject</text>

    <ellipse cx="1135" cy="930" rx="120" ry="34" class="uc"/>
    <text x="1135" y="936" text-anchor="middle" class="ucText">Confirm Deal</text>
  </g>

